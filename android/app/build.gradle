plugins {
    id 'com.android.application'
}

android {
    namespace 'com.skylight.lite'
    compileSdk 34

    defaultConfig {
        applicationId "com.skylight.lite"
        minSdk 21  // Compatible with Android 5.0 up to Android 11 (projector) and newer
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
}

dependencies {
    implementation 'androidx.webkit:webkit:1.11.0'
}
